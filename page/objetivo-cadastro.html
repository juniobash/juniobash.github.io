<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/bulma.css">
    <link rel="shortcut icon" href="../favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Objetiva</title>
    <meta name="author" content="Samuel Oliveira">
    <meta name="description" content=" carteira de metas e objetivos">
    <meta name="keywords" content=" carteira, banco digital">
</head>
  <body>
      <header class="block"> 
        <!--HERO 2-->
        <section class="hero is-small is-info">
          <div class="hero-body">
            <div class="hero-head">
              <nav class="level">
                <!-- Left side -->
                <div class="level-left">
                    <a class="level-item button is-link" href="carteira.html" >CARTEIRA</a>  
                </div>
                <!-- Right side -->
                <div class="level-right">
                  <p class="level-item"><strong class="smalltitle">Samuel Oliveira</strong></p>
                  <p class="level-item"><a href="../index.html" class="button is-danger">Sair</a></p>                  
                  <p class="level-item"></p>
                </div>
              </nav>
            </div>
            <section class="is-small is-centered section">

              <div class="container has-text-centered">
                <p class="title">
                  Carteira Objetiva
                </p>
                <p class="subtitle">
                  Mimos, Objetivos e Metas
                </p>
              </div>
            </section>
          </div>
        </section>
      </header>
    <main class="container is-fullwidth">
      <section class="block">
                    <!--FORMULARIO COMPLELTO-->
                    <form class="section" asp-action="Cadastro" method="POST">
                      <div class="field">
                        <label asp-for="Nome" class="label">Nome</label>
                        <div class="control">
                          <input asp-for="Nome" class="input" type="text" placeholder="Nome do Objetivo">
                        </div>
                      </div>
                      <div class="field">
                        <label asp-for="Detalhe" class="label">Detalhe</label>
                        <div class="control">
                          <input asp-for="Detalhe" class="input" type="text" placeholder="Detalhe do Objetivo">
                        </div>
                      </div>
                    <div class="field">
                        <label asp-for="Valor" class="label">Valor do Objetivo</label>
                        <div class="control">
                          <input asp-for="Valor" class="input" type="text" placeholder="Valor do Objetivo">
                        </div>
                      </div>  
                      <div class="field">
                        <div class="control">
                          <input asp-for="Aplicado" class="input" type="hidden" placeholder="0">
                        </div>
                      </div>                         
                    <div class="field">
                        <label asp-for="DataLimite" class="label">Data Limite</label>
                        <div class="control">
                          <input asp-for="DataLimite" class="input" type="date" placeholder="Digite a Data Limite do Objetivo">
                        </div>
                      </div> 
                      <div class="field is-grouped">
                        <div class="control">
                          <input type="submit" class="button is-medium is-link" value="Cadastrar Objetivo">
                        </div>
                      </div>
                    </form>
        </section>
    </main>

 <!--FOOTER-->
 <footer class="block footer">

</html>
