<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/bulma.css">
    <link rel="shortcut icon" href="../favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Objetiva</title>
    <meta name="author" content="Samuel Oliveira">
    <meta name="description" content=" carteira de metas e objetivos">
    <meta name="keywords" content=" carteira, banco digital">
</head>
  <body>
      <header class="block"> 
        <!--HERO 2-->
        <section class="hero is-info">
          <div class="hero-body">
            <div class="hero-head">
              <nav class="level">
                <!-- Left side -->
                <div class="level-left">
                    <a class="level-item button is-link" href="../page/carteira.html" >CARTEIRA</a>
                  </div>
                <!-- Right side -->
                <div class="level-right">
                  <p class="level"></p>
                  <p class="level-item"><strong class="smalltitle">Samuel Oliveira</strong></p>
                  <p class="level-item"><a href="../index.html" class="button is-danger">Sair</a></p>
                  <p class="level-item"><a></a></p>
                </div>
              </nav>
            </div>
          </div>
        </section>
        <section class="section is-small">
          </section>
      </header>
    <main class="container is-fullwidth block">

        <!--CARTEIRA--> 
                  <div class="tile is-ancestor">
                    <div class="tile is-horizontal">
                      <div class="tile is-parent is-4">
                        <div class="tile is-child">
                            <div class="card">
                                <div class="card-image">
                                <figure class="image">
                                  <img src="../img/princesaleia.jpg">
                                </figure> 
                                </div>
                                <div class="card-content">
                                  <h1 class="title is-large">Isabel Oliveira</h1>
                                  <h1 class="subtitle is-large">Agencia: #01<small>Conta: #001</small></h1>
                                </div>
                                <div class="card-content">
                                    <h1 class="title is-large">R$20 <small><sup>Disponivel</sup></small></h1>
                                    <h1 class="subtitle is-large">R$250 <small><sup>Aplicado</sup></small></h1>
                                </div>
                                <div class="card-footer">
                                    <div class="card-footer-item">
                                      <h1 class="title is-large">R$270 <small><sup>Total</sup></small></h1>
                                </div>
                                </div>                 
                                </div>
                                <!--BOTAO-->
                                <div class="level section">
                                    <div class="level-item"><a href="../page/carteira.html" class="button is-info">Voltar</a></div>
                              </div>                         
                            </div>
                      </div>
                      <div class="tile is-parent">
                        <div class="tile is-child">         
        <!--FORMULARIO LOGIN-->
          <section class="block">
            <h1 class="title">Saldo atualizado na hora!</h1>
            <h2 class="subtitle">
              Qual o Valor da sua Tranferencia?
            </h2>
    
            <div class="field">
              <p class="control has-icons-left has-icons-right">
                <label class="" >AGENCIA:</label>
                <input class="input" type="number" placeholder="agencia">
                <span class="icon is-small is-left">
                  <i class="fas fa-envelope"></i>
                </span>
                <span class="icon is-small is-right">
                  <i class="fas fa-check"></i>
                </span>
              </p>
            </div>
            <div class="field">
              <p class="control has-icons-left">
                <label class="" >CONTA:</label>
                <input class="input" type="number" placeholder="conta">
                <span class="icon is-small is-left">
                  <i class="fas fa-lock"></i>
                </span>
              </p>
            </div>
            <div class="field">
                <p class="control has-icons-left">
                  <input class="input" type="number" placeholder="Digite o Valor da Transferencia">
                  <span class="icon is-small is-left">
                    <i class="fas fa-lock"></i>
                  </span>
                </p>
              </div>            
            <div class="field">
                <a href="../page/carteira.html" class="button is-danger">
                  Transferir
                </a>
            </div>
          </section>              
                        </div>
                      </div>
                    </div>
                  </div>                                    
    </main>

    <!--FOOTER-->
    <footer class="block footer">
        <!--LEVEL-->
        <nav class="level is-mobile">
          <div class="level-item has-text-centered">
            <div>
              <p class="heading">Tweets</p>
              <p class="title">3,456</p>
            </div>
          </div>
          <div class="level-item has-text-centered">
            <div>
              <p class="heading">Following</p>
              <p class="title">123</p>
            </div>
          </div>
          <div class="level-item has-text-centered">
            <div>
              <p class="heading">Followers</p>
              <p class="title">456K</p>
            </div>
          </div>
          <div class="level-item has-text-centered">
            <div>
              <p class="heading">Likes</p>
              <p class="title">789</p>
            </div>
          </div>
        </nav>
        <div class="content has-text-centered">
            <strong>Junio-jedi</strong> by <a href="#">Samuel Oliveira</a>
        </div>
    </footer>
  </body>
</html>
