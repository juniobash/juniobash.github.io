<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/bulma.css">
    <link rel="shortcut icon" href="../favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Objetiva</title>
    <meta name="author" content="Samuel Oliveira">
    <meta name="description" content=" carteira de metas e objetivos">
    <meta name="keywords" content=" carteira, banco digital">
</head>
  <body>
      <header class="block"> 
        <!--HERO 2-->
        <section class="hero is-small is-info">
          <div class="hero-body">
            <div class="hero-head">
              <nav class="level">
                <!-- Left side -->
                <div class="level-left">
                    <a class="level-item button is-link" href="../index.html" >INICIO</a>  
                </div>
                <!-- Right side -->
                <div class="level-right">
                  <p class="level-item"></p>
                </div>
              </nav>
            </div>
            <section class="is-small is-centered section">

              <div class="container has-text-centered">
                <p class="title">
                  Carteira Objetiva
                </p>
                <p class="subtitle">
                  Mimos, Objetivos e Metas
                </p>
              </div>
            </section>
          </div>
        </section>
      </header>
    <main class="container is-fullwidth">
        <section class="block">
                    <!--FORMULARIO COMPLELTO-->
                    <form class="section" asp-action="Cadastro" method="POST">
                        <div class="field">
                          <label asp-for="Nome" class="label">Nome</label>
                          <div class="control">
                            <input asp-for="Nome" class="input" type="text" placeholder="Digite Seu Nome">
                          </div>
                        </div>
                        <div class="field">
                          <label asp-for="Login" class="label">Login</label>
                          <div class="control">
                            <input asp-for="Login" class="input" type="text" placeholder="Digite Seu Login">
                          </div>
                        </div>
                      <div class="field">
                          <label asp-for="Senha" class="label">Senha</label>
                          <div class="control">
                            <input asp-for="Senha" class="input" type="text" placeholder="Digite Sua Senha">
                          </div>
                        </div>   
                      <div class="field">
                          <label asp-for="Cpf" class="label">Cpf</label>
                          <div class="control">
                            <input asp-for="Cpf" class="input" type="number" placeholder="Digite seu cpf">
                          </div>
                        </div> 
                        <div class="field is-grouped">
                          <div class="control">
                            <input type="submit" class="button is-medium is-link" value="Cadastrar Usuario">
                          </div>
                        </div>
                      </form>            
        </section>
    </main>

 <!--FOOTER-->
 <footer class="block footer">
  <!--LEVEL-->
  <nav class="level is-mobile">
    <div class="level-item has-text-centered">
      <div>
        <p class="heading">Tweets</p>
        <p class="title">3,456</p>
      </div>
    </div>
    <div class="level-item has-text-centered">
      <div>
        <p class="heading">Following</p>
        <p class="title">123</p>
      </div>
    </div>
    <div class="level-item has-text-centered">
      <div>
        <p class="heading">Followers</p>
        <p class="title">456K</p>
      </div>
    </div>
    <div class="level-item has-text-centered">
      <div>
        <p class="heading">Likes</p>
        <p class="title">789</p>
      </div>
    </div>
  </nav>
  <div class="content has-text-centered">
      <strong>Junio-jedi</strong> by <a href="#">Samuel Oliveira</a>
  </div>
</footer>
  </body>
</html>
